<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — pronto</title>
  <meta name="description" content="Sign in to your pronto account." />
  <link rel="canonical" href="https://pronto.online/login.html" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100dvh; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: clamp(20px, 4vw, 48px) 16px; }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: clamp(28px, 5vw, 44px);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .auth-logo {
      display: flex;
      justify-content: center;
    }

    .auth-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .auth-header { text-align: center; }

    .auth-title {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin: 0 0 6px;
    }

    .auth-sub {
      font-size: 0.83rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .auth-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .auth-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .auth-input::placeholder { color: var(--muted); opacity: 0.55; }

    .auth-input:focus {
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06);
    }

    .auth-input.is-error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
    }

    .auth-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .auth-remember {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      user-select: none;
    }

    .auth-remember input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--text);
      cursor: pointer;
    }

    .auth-forgot {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: transparent;
      transition: color 0.15s ease, text-decoration-color 0.15s ease;
    }

    .auth-forgot:hover {
      color: var(--text);
      text-decoration-color: var(--text);
    }

    .auth-error {
      display: none;
      font-size: 0.8rem;
      color: #dc2626;
      font-family: var(--font-mono);
      padding: 9px 12px;
      background: rgba(220, 38, 38, 0.06);
      border: 1px solid rgba(220, 38, 38, 0.15);
      border-radius: var(--radius-sm);
    }

    .auth-submit {
      width: 100%;
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--text);
      color: var(--bg);
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .auth-submit:hover  { opacity: 0.88; transform: translateY(-1px); }
    .auth-submit:active { transform: translateY(0); }
    .auth-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--text);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .auth-notice {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.04em;
      color: var(--muted);
      opacity: 0.6;
      line-height: 1.6;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-google:hover {
      background: var(--bg);
      border-color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }

    .btn-google:active { transform: translateY(0); }
    .btn-google:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-google svg { flex-shrink: 0; }

    /* Success state */
    .auth-success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      padding: 8px 0;
    }

    .auth-success-icon {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .auth-success-msg {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .auth-success-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="header">
    <a href="/index.html" class="logo">
      <img src="/logo.png" class="logo-mark" alt="pronto" />
    </a>
  </header>

  <main id="main-content">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="/logo.png" alt="pronto" />
      </div>

      <div class="auth-header">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to access your prompt history and Pro features.</p>
      </div>

      <p class="auth-error" id="google-error" style="display:none;font-size:0.8rem;color:#dc2626;font-family:var(--font-mono);padding:9px 12px;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.15);border-radius:var(--radius-sm);"></p>

      <button type="button" class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9087c1.7018-1.5668 2.6836-3.874 2.6836-6.615Z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.4673-.8059 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.8591-3.0477.8591-2.3441 0-4.3282-1.5832-5.036-3.7105H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18Z" fill="#34A853"/>
          <path d="M3.964 10.71C3.7841 10.17 3.6818 9.5945 3.6818 9s.1023-1.17.2823-1.71V4.9582H.9574C.3477 6.1732 0 7.5477 0 9s.3477 2.8268.9574 4.0418L3.964 10.71Z" fill="#FBBC05"/>
          <path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.4259 0 9 0 5.4818 0 2.4382 2.0168.9574 4.9582L3.964 7.29C4.6718 5.1627 6.6559 3.5795 9 3.5795Z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or sign in with email</div>

      <form class="auth-form" id="login-form" novalidate>
        <p class="auth-error" id="login-error"></p>

        <div class="auth-field">
          <label class="auth-label" for="login-email">Email</label>
          <input class="auth-input" id="login-email" type="email"
            placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="login-password">Password</label>
          <input class="auth-input" id="login-password" type="password"
            placeholder="Your password" autocomplete="current-password" required />
        </div>

        <div class="auth-row">
          <label class="auth-remember">
            <input type="checkbox" id="login-remember" />
            Remember me
          </label>
          <a href="#" class="auth-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit" id="login-submit">Sign in →</button>
      </form>

      <div class="auth-success" id="login-success">
        <div class="auth-success-icon">◆</div>
        <p class="auth-success-msg">You're in!</p>
        <p class="auth-success-sub">Redirecting you to the workbench…</p>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up free</a>
      </div>


    </div>
  </main>

  <script src="/theme.js"></script>
  <script src="/supabase-client.js"></script>
  <script>
    // Google OAuth
    (function () {
      var btn = document.getElementById('btn-google');
      var errEl = document.getElementById('google-error');
      if (!btn) return;

      function doGoogle() {
        btn.disabled = true;
        btn.querySelector('svg + *') // text node — can't directly update, use innerHTML trick
        btn.innerHTML = btn.innerHTML; // no-op, keep icon
        btn.lastChild.textContent = ' Redirecting…';
        window._supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/dashboard.html' },
        }).then(function (result) {
          if (result.error) {
            errEl.textContent = result.error.message || 'Google sign-in failed.';
            errEl.style.display = 'block';
            btn.disabled = false;
          }
          // On success, Supabase redirects the browser — nothing else needed
        });
      }

      btn.addEventListener('click', function () {
        errEl.style.display = 'none';
        if (window._supabase) { doGoogle(); }
        else { document.addEventListener('supabase:ready', doGoogle, { once: true }); }
      });
    })();

    (function () {
      var form    = document.getElementById('login-form');
      var errorEl = document.getElementById('login-error');
      var submit  = document.getElementById('login-submit');
      var success = document.getElementById('login-success');
      if (!form) return;

      // If already logged in, go straight to dashboard
      document.addEventListener('supabase:ready', function (e) {
        if (e.detail && e.detail.session) {
          window.location.href = '/dashboard.html';
        }
      });

      // Forgot password
      var forgotLink = document.querySelector('.auth-forgot');
      if (forgotLink) {
        forgotLink.addEventListener('click', function (e) {
          e.preventDefault();
          var email = document.getElementById('login-email').value.trim();
          if (!email) {
            errorEl.textContent = 'Enter your email address first, then click Forgot password.';
            errorEl.style.display = 'block';
            return;
          }
          function doReset() {
            window._supabase.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + '/login.html',
            }).then(function (result) {
              if (result.error) {
                errorEl.textContent = result.error.message;
                errorEl.style.display = 'block';
              } else {
                errorEl.style.display = 'none';
                form.style.display = 'none';
                success.style.display = 'flex';
                success.querySelector('.auth-success-msg').textContent = 'Check your inbox';
                success.querySelector('.auth-success-sub').textContent = 'A password reset link has been sent to ' + email;
              }
            });
          }
          if (window._supabase) { doReset(); }
          else { document.addEventListener('supabase:ready', doReset, { once: true }); }
        });
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email    = document.getElementById('login-email');
        var password = document.getElementById('login-password');

        errorEl.style.display = 'none';
        [email, password].forEach(function (el) { el.classList.remove('is-error'); });

        var valid = true;
        if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
          email.classList.add('is-error');
          valid = false;
        }
        if (!password.value) {
          password.classList.add('is-error');
          valid = false;
        }
        if (!valid) {
          errorEl.textContent = 'Please check your email and password.';
          errorEl.style.display = 'block';
          return;
        }

        submit.disabled = true;
        submit.textContent = 'Signing in…';

        function doSignIn() {
          window._supabase.auth.signInWithPassword({
            email: email.value.trim(),
            password: password.value,
          }).then(function (result) {
            if (result.error) {
              errorEl.textContent = result.error.message || 'Sign in failed. Check your email and password.';
              errorEl.style.display = 'block';
              submit.disabled = false;
              submit.textContent = 'Sign in →';
            } else {
              form.style.display = 'none';
              success.style.display = 'flex';
              setTimeout(function () { window.location.href = '/dashboard.html'; }, 1000);
            }
          });
        }

        if (window._supabase) { doSignIn(); }
        else { document.addEventListener('supabase:ready', doSignIn, { once: true }); }
      });
    })();
  </script>
</body>
</html>
