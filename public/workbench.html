<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Workbench — pronto</title>
  <meta name="description" content="Polish your prompts for ChatGPT, Claude, Gemini and more — in seconds." />
  <link rel="canonical" href="https://pronto.online/workbench.html" />
  <meta property="og:title" content="Workbench — pronto" />
  <meta property="og:description" content="Polish your prompts for ChatGPT, Claude, Gemini and more — in seconds." />
  <meta property="og:url" content="https://pronto.online/workbench.html" />
  <meta property="og:image" content="https://pronto.online/logo.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Workbench — pronto" />
  <meta name="twitter:description" content="Polish your prompts for ChatGPT, Claude, Gemini and more — in seconds." />
  <meta name="twitter:image" content="https://pronto.online/logo.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="workbench-body">

  <!-- Mobile header (≤719px only) -->
  <header class="wb-mobile-header">
    <a href="/index.html" class="logo">
      <img src="/logo.png" class="logo-mark" alt="pronto" />
    </a>
    <button class="wb-sidebar-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="wb-sidebar">
      <span class="nav-toggle-bars" aria-hidden="true"></span>
    </button>
  </header>

  <div class="wb-shell">

    <!-- ── Sidebar ── -->
    <aside class="wb-sidebar" id="wb-sidebar">

      <div class="wb-sidebar-top">
        <a href="/index.html" class="wb-logo">
          <img src="/logo.png" class="wb-logo-img" alt="pronto" />
        </a>
        <button class="wb-new-chat" type="button" id="wb-new-chat">
          ＋ &nbsp;New chat
        </button>
      </div>

      <!-- Hidden inputs kept for app.js compatibility -->
      <input type="hidden" id="target-audience" value="" />
      <input type="hidden" id="constraints" value="" />

      <div class="wb-sidebar-footer">
        <a href="/index.html" class="wb-sidebar-link">← Home</a>
        <a href="/pricing.html" class="wb-sidebar-link">Pricing</a>
        <a href="/why.html" class="wb-sidebar-link">Why pronto?</a>
        <a href="/contact.html" class="wb-sidebar-link">Contact</a>
        <a href="/privacy.html" class="wb-sidebar-link">Privacy</a>
        <a href="/terms.html" class="wb-sidebar-link">Terms</a>
      </div>

      <button class="wb-sidebar-collapse" type="button" id="wb-sidebar-collapse" aria-label="Collapse sidebar">&laquo;</button>
      <button class="wb-sidebar-expand" type="button" id="wb-sidebar-expand" aria-label="Expand sidebar">&raquo;</button>

    </aside>

    <!-- Tap-outside overlay (mobile) -->
    <div class="wb-sidebar-overlay" id="wb-sidebar-overlay"></div>

    <!-- ── Main chat ── -->
    <div class="wb-main">

      <div class="wb-topbar">
        <span class="wb-title">/workbench</span>
        <span class="wb-ai-msg" id="wb-ai-msg">basic polish</span>
        <div class="wb-ai-toggle-wrap is-off" id="wb-ai-wrap">
          <span class="wb-ai-dot" aria-hidden="true"></span>
          <button type="button" class="wb-ai-toggle" id="wb-ai-toggle" aria-label="AI assist off" aria-pressed="false">AI</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="wb-messages" id="chat-messages">
        <div class="wb-welcome" id="chat-welcome">
          <h2 class="wb-welcome-title">Polish your prompts</h2>
          <p class="wb-welcome-sub">
            Paste a rough or messy prompt, pronto structures it into a clear,
            effective prompt for ChatGPT, Claude, Gemini and more.
          </p>
          <div class="wb-welcome-chips">
            <button class="wb-chip" type="button">create a personal portfolio</button>
            <button class="wb-chip" type="button">tell me about world war 2</button>
            <button class="wb-chip" type="button">write me a blog post about marketing</button>
          </div>
        </div>
      </div>

      <!-- Input card with tone pills built in -->
      <div class="wb-input-bar">
        <div class="wb-input-card">
          <textarea
            id="rough-prompt"
            class="wb-textarea"
            rows="1"
            placeholder="Type your rough prompt…"
          ></textarea>

          <div class="wb-input-controls">
            <!-- Tone pill buttons — hidden select stays in sync for app.js -->
            <div class="wb-tone-pills" role="group" aria-label="Select tone">
              <button class="wb-tone-pill is-active" data-tone=""            type="button">Default</button>
              <button class="wb-tone-pill"            data-tone="professional" type="button">Professional</button>
              <button class="wb-tone-pill"            data-tone="friendly"     type="button">Friendly</button>
              <button class="wb-tone-pill"            data-tone="detailed"     type="button">Detailed</button>
              <button class="wb-tone-pill"            data-tone="creative"     type="button">Creative</button>
            </div>

            <!-- Hidden select read by app.js -->
            <select id="desired-tone" aria-hidden="true" tabindex="-1"
              style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
              <option value="">Any tone</option>
              <option value="professional">Professional</option>
              <option value="friendly">Friendly</option>
              <option value="detailed">Detailed</option>
              <option value="creative">Creative</option>
            </select>

            <button type="button" class="wb-send-btn" id="polish-btn" aria-label="Polish prompt">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="wb-input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for a new line</p>
      </div>

    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/wb.js"></script>
</body>
</html>
